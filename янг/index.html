<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purple Voice & Screen Share</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #1a1a1a;
            --primary-purple: #a020f0;
            --accent-purple: #8a2be2;
            --text-white: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(160, 32, 240, 0.2);
            border: 1px solid #333;
            width: 90%;
            max-width: 800px;
        }

        /* Сетка для видео */
        .video-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        video {
            width: 320px;
            height: 240px;
            background: #000;
            border-radius: 15px;
            border: 2px solid var(--primary-purple);
        }

        .controls {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        input {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: white;
            margin: 5px;
        }

        button {
            padding: 12px 20px;
            background-color: var(--primary-purple);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { background-color: var(--accent-purple); }
        button.active { background-color: #ff4500; } /* Цвет для включенного микрофона */

        #chat-box {
            height: 150px;
            overflow-y: auto;
            margin: 20px 0;
            padding: 10px;
            border: 1px solid #333;
            border-radius: 10px;
            background: #000;
            text-align: left;
        }

        .chat-msg { margin-bottom: 8px; }
        .msg-me { color: var(--primary-purple); font-weight: bold; }
        .msg-them { color: #ccc; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Purple Room</h1>
    
    <!-- Экран для видео -->
    <div class="video-container">
        <div>
            <p>Твоё видео/экран:</p>
            <video id="localVideo" autoplay muted></video>
        </div>
        <div>
            <p>Видео друга:</p>
            <video id="remoteVideo" autoplay></video>
        </div>
    </div>

    <div id="setup-screen">
        <input type="text" id="room-id-input" placeholder="Введите ID друга">
        <button id="join-btn">Войти</button>
        <p class="status" id="status-text">Подключение...</p>
    </div>

    <div id="chat-screen" class="hidden">
        <div class="controls">
            <button id="mic-btn">🎤 Микрофон: Вкл</button>
            <button id="share-btn">🖥 Демонстрация экрана</button>
        </div>
        <div id="chat-box"></div>
        <div id="input-area" style="display: flex; gap: 10px;">
            <input type="text" id="text-input" placeholder="Сообщение..." style="flex-grow: 1;">
            <button id="send-btn">Отправить</button>
        </div>
        <p class="status">Твой ID: <span id="my-id-display">...</span></p>
    </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
    const localVideo = document.getElementById('localVideo');
    const remoteVideo = document.getElementById('remoteVideo');
    const statusText = document.getElementById('status-text');
    const myIdDisplay = document.getElementById('my-id-display');
    const micBtn = document.getElementById('mic-btn');
    const shareBtn = document.getElementById('share-btn');

    let peer;
    let localStream;
    let currentCall;
    let isMuted = false;

    // Инициализация PeerJS
    function initPeer() {
        peer = new Peer();
        peer.on('open', (id) => {
            myIdDisplay.innerText = id;
            statusText.innerText = "Готов! Введите ID друга.";
        });

        peer.on('call', (call) => {
            call.answer(localStream);
            setupCall(call);
        });

        peer.on('connection', (conn) => {
            conn.on('data', (data) => addMessage(data, 'msg-them'));
        });
    }
    initPeer();

    // Кнопка Войти
    document.getElementById('join-btn').onclick = async () => {
        const remoteId = document.getElementById('room-id-input').value;
        if (!remoteId) return alert("Введите ID!");

        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('chat-screen').classList.remove('hidden');

        // Получаем микрофон и камеру сразу
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
        localVideo.srcObject = localStream;

        const call = peer.call(remoteId, localStream);
        setupCall(call);
    };

    function setupCall(call) {
        currentCall = call;
        call.on('stream', (remoteStream) => {
            remoteVideo.srcObject = remoteStream;
        });
    }

    // Управление микрофоном
    micBtn.onclick = () => {
        isMuted = !isMuted;
        localStream.getAudioTracks()[0].enabled = !isMuted;
        micBtn.innerText = isMuted ? "🎤 Микрофон: Выкл" : "🎤 Микрофон: Вкл";
        micBtn.classList.toggle('active');
    };

    // Демонстрация экрана
    shareBtn.onclick = async () => {
        try {
            const screenStream = await navigator.mediaDevices.getDisplayMedia({
                video: { cursor: "always" },
                audio: false
            });
            
            // Заменяем текущий поток видео на поток экрана
            localVideo.srcObject = screenStream;

            // Если мы уже в звонке, обновляем поток для друга
            if (currentCall) {
                currentCall.sendStream(screenStream);
            } else {
                // Если еще не подключились, просто отправляем новый поток при следующем вызове
                localStream = screenStream; 
            }
        } catch (err) {
            console.error("Ошибка захвата экрана:", err);
        }
    };

    // Чат
    document.getElementById('send-btn').onclick = () => {
        const text = document.getElementById('text-input').value;
        if (text && currentCall) {
            addMessage(text, 'msg-me');
            currentCall.send(text);
            document.getElementById('text-input').value = '';
        }
    };

    function addMessage(text, className) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `chat-msg ${className}`;
        msgDiv.innerText = text;
        document.getElementById('chat-box').appendChild(msgDiv);
        document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
    }

    document.getElementById('text-input').addEventListener("keypress", (e) => {
        if (e.key === "Enter") document.getElementById('send-btn').click();
    });
</script>
</body>
</html>
